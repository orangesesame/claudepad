<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaudePad</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="toolbar">
      <div id="toolbar-left"></div>
      <div id="toolbar-right">
        <button id="btn-copy-to-md" title="Copy latest output to editor at cursor">Copy to .md</button>
        <button id="btn-claude" title="Open Claude Chat" class="mode-btn">Claude</button>
        <button id="btn-terminal" title="Show Terminal" class="mode-btn">Terminal</button>
        <button id="btn-new-term" title="New Terminal Tab">+ Term</button>
      </div>
    </div>
    <div id="main">
      <div id="explorer-pane"></div>
      <div id="splitter-explorer"></div>
      <div id="editor-pane">
        <div id="editor-tabs"></div>
        <div id="editor-controls">
          <div id="editor-controls-left">
            <button id="btn-all-tasks" title="Collect all unchecked tasks across workspace">All Tasks</button>
            <button id="btn-daily-tasks" title="Collect unchecked tasks from daily notes">Daily Tasks</button>
          </div>
          <div id="editor-controls-center">
            <span id="editor-filename"></span>
            <span id="editor-close-btn" title="Close file">&times;</span>
          </div>
          <div id="editor-controls-right">
            <button id="btn-split" title="Toggle Split View" class="mode-btn">Split</button>
          </div>
        </div>
      </div>
      <div id="splitter"></div>
      <div id="terminal-pane">
        <div id="terminal-tabs"></div>
        <div id="terminal-container"></div>
      </div>
    </div>
    <div id="version-label"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
